dataset:
  train:
    # biolip
    - class: DynamicBatchWrapper
      dataset:
        class: MixDatasetWrapper
        datasets:
          - class: MoleculeDataset
            mmap_dir: ./datasets/molecule_v2/biolip2_nr/processed/
            specify_index: ./datasets/molecule_v2/biolip2_nr/processed/pretrain_index.txt
            cluster: ./datasets/molecule_v2/biolip2_nr/processed/pretrain_cluster.txt
            length_type: block
            in_memory: true
          - class: MoleculeDataset
            mmap_dir: ./datasets/molecule_v2/biolip2_nr/processed/
            specify_index: ./datasets/molecule_v2/biolip2_nr/processed/finetune_index.txt
            cluster: ./datasets/molecule_v2/biolip2_nr/processed/finetune_cluster.txt
            length_type: block
            in_memory: true
      complexity: n*n
      ubound_per_batch: 400000
      n_use_max_in_batch: true
      silent: true
    # Peptides
    - class: DynamicBatchWrapper
      dataset:
        class: MixDatasetWrapper
        datasets:
          # protein-fragments
          - class: PeptideDataset
            mmap_dir: ./datasets/peptide/ProtFrag/processed
            length_type: block
            in_memory: true
          # pepbench
          - class: PeptideDataset
            mmap_dir: ./datasets/peptide/pepbench/processed
            specify_index: ./datasets/peptide/pepbench/processed/train_index.txt
            cluster: ./datasets/peptide/pepbench/train.cluster
            length_type: block
            in_memory: true
          # protein-peptide complex with non standard amino acids
          - class: PeptideDataset
            mmap_dir: ./datasets/peptide/pepbench/processed
            specify_index: ./datasets/peptide/pepbench/processed/non_standard_index.txt
            length_type: block
            in_memory: true
      complexity: n*n
      ubound_per_batch: 1800000
      n_use_max_in_batch: true
      silent: true
    # Small Molecule
    - class: DynamicBatchWrapper
      dataset:
        class: MixDatasetWrapper
        datasets:
          # crossdocked
          - class: MoleculeDataset
            mmap_dir: ./datasets/molecule_v2/CrossDocked/processed
            specify_index: ./datasets/molecule_v2/CrossDocked/processed/train_index.txt
            length_type: block
            in_memory: true
          # pdbbind general set minus refined set
          - class: MoleculeDataset
            mmap_dir: ./datasets/molecule_v2/PDBbind/processed/v2020-other-PL
            cluster: ./datasets/molecule_v2/PDBbind/processed/v2020-other-PL/index.cluster
            length_type: block
            in_memory: true
          # pdbbind refined set
          - class: MoleculeDataset
            mmap_dir: ./datasets/molecule_v2/PDBbind/processed/refined-set
            specify_index: ./datasets/molecule_v2/PDBbind/processed/refined-set/train_index.txt
            cluster: ./datasets/molecule_v2/PDBbind/processed/refined-set/train.cluster
            length_type: block
            in_memory: true
      complexity: n*n
      ubound_per_batch: 800000
      n_use_max_in_batch: true
      silent: true
    # SIU
    - class: DynamicBatchWrapper
      dataset:
        class: MixDatasetWrapper
        datasets:
          - class: MoleculeDataset
            mmap_dir: ./datasets/molecule_v2/SIU/processed
            cluster: ./datasets/molecule_v2/SIU/processed/index.cluster
            length_type: block
            in_memory: false
        weights: [0.05]
      complexity: n*n
      ubound_per_batch: 800000
      n_use_max_in_batch: true
      silent: true
    # Antibody
    - class: DynamicBatchWrapper
      dataset:
        class: AntibodyDataset
        mmap_dir: ./datasets/antibody/SAbDab/processed
        specify_index: ./datasets/antibody/SAbDab/processed/train_index.txt
        length_type: block
        in_memory: true
      complexity: n*n
      ubound_per_batch: 900000
      n_use_max_in_batch: true
      silent: true
  valid:
    - class: DynamicBatchWrapper
      dataset: 
        class: PeptideDataset
        mmap_dir: ./datasets/peptide/pepbench/processed
        specify_index: ./datasets/peptide/pepbench/processed/valid_index.txt
        length_type: block
        in_memory: true
      complexity: n*n
      ubound_per_batch: 1800000
      n_use_max_in_batch: true
      silent: true
    - class: DynamicBatchWrapper
      dataset: 
        class: MoleculeDataset
        mmap_dir: ./datasets/molecule_v2/PDBbind/processed/refined-set
        specify_index: ./datasets/molecule_v2/PDBbind/processed/refined-set/valid_index.txt
        length_type: block
        in_memory: true
      complexity: n*n
      ubound_per_batch: 600000
      n_use_max_in_batch: true
      silent: true
    - class: DynamicBatchWrapper
      dataset: 
        class: AntibodyDataset
        mmap_dir: ./datasets/antibody/SAbDab/processed
        specify_index: ./datasets/antibody/SAbDab/processed/valid_index.txt
        length_type: block
        in_memory: true
      complexity: n*n
      ubound_per_batch: 900000
      n_use_max_in_batch: true
      silent: true

dataloader:
  train:
    shuffle: true
    num_workers: 16
  valid:
    num_workers: 8

trainer:
  class: LDMTrainer
  criterion: loss
  config:
    max_epoch: 500
    save_topk: 10
    val_freq: 10
    save_dir: ./ckpts/ldm
    patience: 10
    grad_clip: 10.0
    metric_min_better: true
    enable_mixed_precision: false
    proj_name: AnewOmin # for wandb
    logger: tensorboard
    continue_version: 0

    optimizer:
      class: AdamW
      lr: 1.0e-4

    scheduler:
      class: ReduceLROnPlateau
      factor: 0.8
      patience: 5
      mode: min
      frequency: val_epoch
      min_lr: 5.0e-6

model:
  class: LDMMolDesignClean
  autoencoder_ckpt: '' # load by yourself
  latent_deterministic: true  # without resample in training
  hidden_size: 512
  num_steps: 100
  h_loss_weight: 1.0
  std: 10.0
  diffusion_opt:
    trans_seq_type: Diffusion
    trans_pos_type: Diffusion
    encoder_type: EPT
    encoder_opt:
      n_layers: 6
      n_rbf: 64
      cutoff: 3.0  # already normalized
      n_head: 8
      use_edge_feat: true
      pre_norm: true
      efficient: false
      vector_act: layernorm
  is_aa_corrupt_ratio: 0.1
  max_cond_ratio_2d: 1.0
  max_cond_ratio_3d: 1.0
  use_condition_sampler: true

load_ckpt: ''
