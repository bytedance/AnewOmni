name: AnewOmni
channels:
  - pytorch
  - nvidia
  - bioconda
  - conda-forge
  - pyg
  - defaults
dependencies:
  - python=3.10
  - biopython=1.80
  - biotite=1.1.0
  - scikit-learn=1.6.1
  - scipy=1.13.1
  - pandas=2.2.3
  - tensorboard=2.12.1
  - bioconda::mmseqs2=17.b804f
  - openmm=8.2.0
  - pdbfixer=1.11
  - dockq=2.1.3
  - tqdm=4.67.1
  - easydict=1.13
  - wandb=0.19.8
  - sympy=1.13.3
  - packaging=24.2 # for torch.utils.tensorboard
  - networkx=3.4.2
  - rdkit=2024.9.6
  - bioconda::anarci=2024.05.21
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu124
    - --find-links https://data.pyg.org/whl/torch-2.5.1+cu124.html
    - posebusters==0.3.6
    - ray==2.44.0
    - setuptools==80.9.0  # prolif uses deprecated API in setuptools
    - prolif==2.0.3
    # packages from extra index
    - torch==2.5.1+cu124
    # packages from find-links
    - torch-scatter==2.1.2